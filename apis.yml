aid: integral-ad-science
name: Integral Ad Science
description: >-
  Integral Ad Science (NASDAQ: IAS) is a New York-based global ad verification
  and digital media measurement company. IAS provides technology and data that
  measures the quality, viewability, ad fraud, brand safety and suitability,
  contextual targeting, and attention performance of digital advertising across
  CTV and video, the open web, social platforms, mobile and in-app, and digital
  audio. Its products serve advertisers and agencies, publishers, and ad-tech
  platforms with proprietary capabilities including Quality Impressions, Total
  Visibility, Total Media Quality, Context Control, and the IAS Agent platform
  for generative-AI-era brand safety. IAS does not publish a general-purpose
  public developer API, OpenAPI specification, or self-serve SDK portal;
  customer access to IAS data and measurement is delivered through enterprise
  integrations with DSPs, SSPs, ad servers, social platforms, and walled
  gardens, plus the IAS Signal reporting platform, header-bidding modules
  (Prebid IAS RTD provider and bidder adapter), and partner connectors such as
  the Salesforce Marketing Cloud Intelligence (Datorama) IAS connector. The
  company's GitHub organization (github.com/integralads) is primarily internal
  tooling, forks, and ad-tech ecosystem contributions rather than a documented
  developer SDK surface.
